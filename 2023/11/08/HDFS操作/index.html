        <h1 id="HADOOP-hdfs操作"><a href="#HADOOP-hdfs操作" class="headerlink" title="HADOOP hdfs操作"></a>HADOOP hdfs操作</h1><blockquote>
<p><strong>创建目录</strong>  :</p>
</blockquote>
<figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">Hadoop  fs  -mkdir  /test								#在hdfs 根目录创建test文件夹（目录）</span><br></pre></td></tr></table></figure>



<blockquote>
<p><strong>查看<code>test.txt</code>  文件的内容</strong>  ：</p>
</blockquote>
<figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">hadop fs  -cat  /test.txt</span><br></pre></td></tr></table></figure>



<blockquote>
<p><strong>列出根目录下的所有列表</strong>   ：</p>
</blockquote>
<figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">hadoop fs -ls   /</span><br></pre></td></tr></table></figure>



<blockquote>
<p><strong>从本地上传到hdfs根目录</strong>  ：</p>
</blockquote>
<figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">hadoop  fs  -put   test.txt    /						#从本地上传test.txt 文件到hdfs 根目录</span><br></pre></td></tr></table></figure>



<blockquote>
<p><strong>从hdfs 下载到本地</strong>  ：</p>
</blockquote>
<figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">hadoop  fs  -get  /test.txt    /						#从hdfs下载test.txt 文件到本地</span><br></pre></td></tr></table></figure>



<blockquote>
<p><strong>从本地剪贴到hdfs根目录</strong>  :</p>
</blockquote>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">hadoop   fs  -MoveFromLocal    test.txt   /   </span><br></pre></td></tr></table></figure>
